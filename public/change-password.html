<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bibliotecă • Schimbă parola</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body[data-page="change-password"] {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
    }
    body[data-page="change-password"] .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    body[data-page="change-password"] .container {
      margin-top: 80px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    body[data-page="change-password"] .card {
      max-width: 450px;
      width: 100%;
      margin: 0 auto;
    }
  </style>
</head>
<body data-page="change-password">
  <div class="nav">
    <div class="brand">🔐 Schimbă parola</div>
  </div>

  <div class="container">
    <div class="card">
      <h2 style="text-align: center; margin-top: 0;">Schimbă parola</h2>
      <p class="muted" style="text-align: center;">Trebuie să-ți schimbi parola la prima conectare.</p>
      
      <label class="small muted">Parola veche</label>
      <input class="input" id="oldPassword" type="password">

      <div style="height:10px"></div>

      <label class="small muted">Parola nouă</label>
      <input class="input" id="newPassword" type="password">

      <div style="height:10px"></div>

      <label class="small muted">Confirmă parola nouă</label>
      <input class="input" id="confirmPassword" type="password">

      <div style="height:12px"></div>
      <button class="btn primary" id="btnChange" style="width: 100%;">Schimbă parola</button>

      <div id="toast"></div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
