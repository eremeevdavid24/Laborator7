version: '3.8'

services:
  web:
    build: .
    container_name: library_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: biblioteca
      DB_USER: root
      DB_PASSWORD: 

  db:
    image: mysql:8.0
    container_name: library_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 
      MYSQL_DATABASE: biblioteca
      MYSQL_USER: root
      MYSQL_PASSWORD: 
    ports:
      - "3307:3306"
   # volumes:
     # - db_data:/var/lib/mysql
     # - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data: